<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium, dynamic Todo application to manage your daily tasks with persistence.">
    <title>Sleek Todo | Manage Your Tasks Letlessly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="app-container">
        <header class="app-header">
            <h1 id="main-heading">My Tasks</h1>
            <p>Stay organized, focused, and productive.</p>
        </header>

        <form id="todo-form" class="todo-form">
            <div class="input-wrapper">
                <input type="text" id="todo-input" placeholder="What needs to be done?" aria-label="New Task"
                    autocomplete="off">
                <button type="submit" id="add-btn" class="add-btn" aria-label="Add Task">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>
        </form>

        <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="todo-list" class="todo-list" aria-label="Task List">
            <!-- Todos will be dynamically inserted here -->
        </ul>

        <div class="stats" id="stats">
            <span id="items-left">0 items left</span>
            <button id="clear-completed" class="clear-btn">Clear Completed</button>
        </div>
    </main>
    <script src="script.js"></script>

    <!-- dddd -->

</body>

</html>
